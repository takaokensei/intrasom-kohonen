<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Tokyo Night Gradients -->
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7aa2f7" />
      <stop offset="100%" stop-color="#3d59a1" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bb9af7" />
      <stop offset="100%" stop-color="#7a5ccc" />
    </linearGradient>
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dcfff" />
      <stop offset="100%" stop-color="#0db9d7" />
    </linearGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background container, styled with Tokyo Night Dark Theme -->
  <rect width="128" height="128" rx="28" fill="#1a1b26" stroke="#24283b" stroke-width="2"/>

  <!-- Network connection lines (synaptic weights) -->
  <g stroke="#414868" stroke-width="3" opacity="0.6">
    <!-- Connections between hexagon centers -->
    <line x1="64" y1="36" x2="38" y2="80" />
    <line x1="64" y1="36" x2="90" y2="80" />
    <line x1="38" y1="80" x2="90" y2="80" />
    
    <!-- Outside connections representing map grid -->
    <line x1="64" y1="36" x2="64" y2="12" stroke-dasharray="4,4" />
    <line x1="38" y1="80" x2="14" y2="80" stroke-dasharray="4,4" />
    <line x1="90" y1="80" x2="114" y2="80" stroke-dasharray="4,4" />
  </g>

  <!-- Muted connection nodes -->
  <g fill="#414868">
    <circle cx="64" cy="12" r="4" />
    <circle cx="14" cy="80" r="4" />
    <circle cx="114" cy="80" r="4" />
  </g>

  <!-- Hexagons in lattice structure -->
  <!-- Top Hexagon (Cyan/Teal) -->
  <polygon points="64,18 79.6,27 79.6,45 64,54 48.4,45 48.4,27" fill="url(#teal-grad)" filter="url(#glow)"/>
  
  <!-- Bottom Left Hexagon (Blue) -->
  <polygon points="38,62 53.6,71 53.6,89 38,98 22.4,89 22.4,71" fill="url(#blue-grad)" filter="url(#glow)"/>
  
  <!-- Bottom Right Hexagon (Purple) -->
  <polygon points="90,62 105.6,71 105.6,89 90,98 74.4,89 74.4,71" fill="url(#purple-grad)" filter="url(#glow)"/>

  <!-- Network center dots (activation nodes) -->
  <circle cx="64" cy="36" r="3.5" fill="#ffffff" />
  <circle cx="38" cy="80" r="3.5" fill="#ffffff" />
  <circle cx="90" cy="80" r="3.5" fill="#ffffff" />
</svg>